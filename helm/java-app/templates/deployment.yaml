apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ include "java-app.fullname" . }}

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: {{ include "java-app.name" . }}

  template:
    metadata:
      labels:
        app: {{ include "java-app.name" . }}

    spec:
      containers:

      - name: java-app

        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

        env:
        - name: APP_VERSION
          value: "{{ .Values.image.tag }}"

        ports:
        - containerPort: {{ .Values.containerPort }}
